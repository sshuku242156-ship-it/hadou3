<!DOCTYPE html>
<html lang="ja">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/addons/p5.sound.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />
    <title>波動シミュレーション</title>
  </head>
  <body>
    <div id="container">
      <div id="canvas-container"></div>
      <div id="control-panel">
        <h2>波動シミュレーション</h2>
        
        <!-- 波の式入力モード -->
        <div id="equation-mode">
          <div class="control-group">
            <h3>波の式から計算</h3>
            <label>式の形式:
              <select id="equationFormat">
                <option value="auto">自動判定</option>
                <option value="form1">形式1: y = A sin(2π/T (t - x/v))</option>
                <option value="form2">形式2: y = A sin(2π(t/T - x/λ))</option>
              </select>
            </label>
            <label>方程式を入力:</label>
            <textarea id="waveEquation" placeholder="例: y = A sin(2π/T (t - x/v))&#10;または y = A sin(2π(t/T - x/λ))&#10;A, T, λ を下の欄で数値設定してください（v = λ/T で自動計算されます）"></textarea>
            <div class="variable-grid">
              <label>A: <input type="number" id="varA" value="40" step="1"></label>
              <label>T: <input type="number" id="varT" value="2" step="0.1"></label>
              <label>λ: <input type="number" id="varLambda" value="100" step="1"></label>
              <label>v (=λ/T, 計算値): <input type="number" id="varV" value="50" step="1" readonly disabled></label>
              <label>l: <input type="number" id="varL" value="800" step="10" disabled></label>
            </div>
            <label><input type="checkbox" id="showReflection" checked> 反射波を表示</label>
            <label>端の条件:
              <select id="boundaryType">
                <option value="fixed">固定端</option>
                <option value="free">自由端</option>
              </select>
            </label>
            <button id="parseBtn">式を解析</button>
            <button id="runBtn">実行</button>
            <div id="parse-result"></div>
          </div>
          
          <div class="control-group">
            <h3>基本パラメータ</h3>
            <label>媒質の長さ l (px, 固定): <input type="number" id="wavelengthL" min="800" max="800" value="800" step="50" disabled></label>
            <label>シミュレーション速度: <input type="range" id="speedFactor" min="0.1" max="3" value="1" step="0.1"></label>
          </div>
        </div>
        
        <!-- 従来のパラメータ入力モード -->
        <details>
          <summary>従来のパラメータ入力モード</summary>
          <div class="control-group">
            <h3>波の数: <input type="number" id="numWaves" min="1" max="5" value="1" step="1"></h3>
            <label>振幅 A (px): <input type="number" id="amplitude" min="5" max="100" value="40" step="5"></label>
          </div>
          <div id="wave-controls"></div>
        </details>
        
        <button id="resetBtn">リセット</button>
      </div>
    </div>
    <script src="sketch.js"></script>
  </body>
</html>
